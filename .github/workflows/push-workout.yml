name: Push Workout to Intervals.icu

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Subcommand'
        required: false
        default: 'push'
        type: choice
        options:
          - push
          - list
          - move
          - delete
          - set-threshold
          - annotate
      workouts:
        description: 'JSON workout(s) — required for push'
        required: false
        type: string
      event_id:
        description: 'Event ID — for move/delete/annotate (planned)'
        required: false
        type: string
      date:
        description: 'Target date YYYY-MM-DD — for move'
        required: false
        type: string
      oldest:
        description: 'List start date (default: today)'
        required: false
        type: string
      newest:
        description: 'List end date (default: +6 days)'
        required: false
        type: string
      sport:
        description: 'Sport family or type — for set-threshold'
        required: false
        type: string
      ftp:
        description: 'FTP — for set-threshold'
        required: false
        type: string
      message:
        description: 'Note text — for annotate'
        required: false
        type: string
      activity_id:
        description: 'Activity ID — for annotate (completed)'
        required: false
        type: string
      confirm:
        description: 'Execute write (false = preview only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Verify push.py exists
        run: |
          if [ ! -f push.py ]; then
            echo "push.py not found in repository root!"
            exit 1
          fi
          echo "push.py found"

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.ATHLETE_ID }}" ]; then
            echo "ATHLETE_ID secret not set!"
            exit 1
          fi
          if [ -z "${{ secrets.INTERVALS_KEY }}" ]; then
            echo "INTERVALS_KEY secret not set!"
            exit 1
          fi
          echo "Secrets configured"

      - name: Run push.py
        env:
          ATHLETE_ID: ${{ secrets.ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_KEY }}
          INPUT_COMMAND: ${{ github.event.inputs.command }}
          INPUT_WORKOUTS: ${{ github.event.inputs.workouts }}
          INPUT_CONFIRM: ${{ github.event.inputs.confirm }}
          INPUT_EVENT_ID: ${{ github.event.inputs.event_id }}
          INPUT_DATE: ${{ github.event.inputs.date }}
          INPUT_OLDEST: ${{ github.event.inputs.oldest }}
          INPUT_NEWEST: ${{ github.event.inputs.newest }}
          INPUT_SPORT: ${{ github.event.inputs.sport }}
          INPUT_FTP: ${{ github.event.inputs.ftp }}
          INPUT_MESSAGE: ${{ github.event.inputs.message }}
          INPUT_ACTIVITY_ID: ${{ github.event.inputs.activity_id }}
        run: |
          python - <<'PYEOF'
          import json, os, sys
          sys.path.insert(0, '.')
          from push import IntervalsPush

          athlete_id = os.environ['ATHLETE_ID']
          api_key = os.environ['INTERVALS_KEY']
          pusher = IntervalsPush(athlete_id, api_key)

          cmd = os.environ.get('INPUT_COMMAND', 'push')
          confirm = os.environ.get('INPUT_CONFIRM', 'false') == 'true'

          if cmd == 'push':
              workouts_raw = os.environ.get('INPUT_WORKOUTS', '')
              if not workouts_raw:
                  print(json.dumps({"success": False, "error": "workouts input is required for push"}))
                  sys.exit(1)
              workouts = json.loads(workouts_raw)
              if confirm:
                  result = pusher.push_workouts(workouts)
              else:
                  result = pusher.preview_push(workouts)

          elif cmd == 'list':
              oldest = os.environ.get('INPUT_OLDEST') or None
              newest = os.environ.get('INPUT_NEWEST') or None
              result = pusher.list_events(oldest=oldest, newest=newest)

          elif cmd == 'move':
              event_id = int(os.environ.get('INPUT_EVENT_ID', 0))
              date = os.environ.get('INPUT_DATE', '')
              if confirm:
                  result = pusher.move_event(event_id, date)
              else:
                  result = pusher.preview_move(event_id, date)

          elif cmd == 'delete':
              event_id = int(os.environ.get('INPUT_EVENT_ID', 0))
              if confirm:
                  result = pusher.delete_event(event_id)
              else:
                  result = pusher.preview_delete(event_id)

          elif cmd == 'annotate':
              message = os.environ.get('INPUT_MESSAGE', '')
              activity_id = os.environ.get('INPUT_ACTIVITY_ID') or None
              event_id_raw = os.environ.get('INPUT_EVENT_ID') or None
              event_id = int(event_id_raw) if event_id_raw else None
              if activity_id:
                  if confirm:
                      result = pusher.annotate_activity(activity_id, message)
                  else:
                      result = pusher.preview_annotate_activity(activity_id, message)
              elif event_id:
                  if confirm:
                      result = pusher.annotate_event(event_id, message)
                  else:
                      result = pusher.preview_annotate_event(event_id, message)
              else:
                  result = {"success": False, "error": "activity_id or event_id required"}

          else:
              result = {"success": False, "error": f"unknown command: {cmd}"}

          print(json.dumps(result, indent=2))
          sys.exit(0 if result.get('success') else 1)
          PYEOF

      - name: Notify on failure
        if: failure()
        run: echo "push.py failed! Check logs above."

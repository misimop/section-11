name: Auto-Sync Intervals.icu Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Verify sync.py exists
        run: |
          if [ ! -f sync.py ]; then
            echo "❌ ERROR: sync.py not found in repo root!"
            ls -la
            exit 1
          fi
          echo "✅ sync.py found ($(wc -c < sync.py) bytes)"
      
      - name: Verify secrets are set
        run: |
          if [ -z "${{ secrets.ATHLETE_ID }}" ]; then
            echo "❌ ERROR: ATHLETE_ID secret not set!"
            exit 1
          fi
          if [ -z "${{ secrets.INTERVALS_KEY }}" ]; then
            echo "❌ ERROR: INTERVALS_KEY secret not set!"
            exit 1
          fi
          echo "✅ All secrets configured"
      
      - name: Run sync
        env:
          ATHLETE_ID: ${{ secrets.ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          WEEK_START: ${{ secrets.WEEK_START }}
          ZONE_PREFERENCE: ${{ secrets.ZONE_PREFERENCE }}
        run: |
          python sync.py \
            --athlete-id "$ATHLETE_ID" \
            --intervals-key "$INTERVALS_KEY" \
            --github-token "$GITHUB_TOKEN" \
            --github-repo "$GITHUB_REPO" \
            --days 7
      
      - name: Commit data files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add -f latest.json history.json ftp_history.json intervals.json routes.json 2>/dev/null || true
          
          git pull --rebase --autostash origin main
          
          if ! git diff --staged --quiet; then
            git commit -m "Sync training data - $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            git push
            echo "✅ Data committed and pushed"
          else
            echo "⏭️ No changes to commit"
          fi
      
      - name: Show result
        run: |
          echo "✅ Sync completed!"
          echo "📊 https://raw.githubusercontent.com/${{ github.repository }}/main/latest.json"
      
      - name: Notify on failure
        if: failure()
        run: echo "::error::⚠️ Sync failed! Check the logs above for details."
